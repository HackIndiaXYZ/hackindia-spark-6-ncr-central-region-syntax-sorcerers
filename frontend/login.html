<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Circuify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">   
</head>
<body>
    <header>
        <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">
            <span class="icon">♻️</span> Circuify
        </a>
        <div class="nav-buttons">
            <button class="btn-primary">Login</button>
            <a href="signup.html"><button class="btn-secondary">Sign Up</button></a>
        </div>
    </header>
    <main>
        <section class="auth-section">
            <div class="card auth-card">
                <a href="index.html" class="back-link">&larr; Back to Diagon Alley</a>
                <h2>Access Your Vault</h2>
                <p style="text-align: center; color: #6b7280; margin-bottom: 1rem;">Log in to trade your waste materials!</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="e.g. harry.potter@hogwarts.ac.uk">
                    </div>
                    <div class="form-group" style="margin-top: 1rem;">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Your magical key">
                    </div>
                    <div class="auth-options" style="margin-top: 1rem;">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#">Forgot password?</a>
                    </div>
                    <p id="error-msg" style="color:red;font-size:0.875rem;margin-top:0.5rem;display:none;"></p>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 0.75rem;">Log In</button>
                </form>
                <div class="auth-footer">
                    <p>New to Circuify? <a href="signup.html">Register as a Wizard</a></p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>Made with magic by Team Circuify for Hackathon 2024 - Mischief Managed!</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
