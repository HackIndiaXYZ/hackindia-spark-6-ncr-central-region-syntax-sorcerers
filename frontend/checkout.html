<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gringotts Authorization | Circuify</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500&family=Cedarville+Cursive&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <header>
        <div class="logo"><span class="icon">✨</span> Circuify</div>
    </header>

    <main class="checkout-wrapper">
        <div class="contract-card">
            <div class="contract-header">
                <h2>Gringotts Authorization</h2>
                <p>Provide details for Owl Post delivery and secure vault transfer.</p>
            </div>
            
            <form id="checkout-form">
                <div class="form-group">
                    <label>Delivery Location (Owl Post Address)</label>
                    <input type="text" id="delivery-addr" required placeholder="e.g. The Three Broomsticks, Hogsmeade">
                </div>
                
                <div class="form-group">
                    <label>Gringotts Vault Number</label>
                    <input type="password" id="vault-number" required placeholder="***">
                </div>
                
                <div class="form-group">
                    <label>Goblin Authorization Signature</label>
                    <input type="text" id="signature" class="signature-input" required placeholder="Sign your magical name">
                </div>
                
                <div class="contract-actions">
                    <button type="submit" class="btn-primary" style="padding: 1rem; font-size: 1.1rem;">
                        Confirm Magical Contract
                    </button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='cart.html'">
                        Review Vault Items
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
